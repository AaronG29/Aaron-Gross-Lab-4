<!DOCTYPE html>
<html>
<head>
    <title>Lab 4 - Aaron Gross</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
        }

        .section {
            border: 2px solid rgb(17, 17, 17);
            margin: 33px;
            padding: 33px;
        }
    </style>
</head>





<body id="pageBody" style="background-color: rgb(91, 159, 182);">

    <h1 id="mainHeading">Lab 4</h1>

    <div class="section">
        <h2>Alert Me!</h2>
        <form onsubmit="showAlert(); return false;">
            <input type="text" id="nameInput" placeholder="Enter your full name" required>
            <button type="submit">Alert Me!</button>
        </form>
    </div>




    <div class="section">
        <h2>Change the Color</h2>
        <button onclick="changeColor()">Change the Color</button>
    </div>






    <div class="section">
        <h2>Text Testing</h2>
        <form onsubmit="validateText(); return false;">
            <input type="text" id="textInput" placeholder="Enter the text">
            <button type="submit">Validate the Text</button>
        </form>
    </div>


    




    <div class="section">
        <h2>Add the Text</h2>
        <button onclick="addText()">Add theText</button>
    </div>

    <script>
        

        function showAlert() {
            var name = document.getElementById("nameInput").value;
            alert("Well hello " + name + "!! :)");
        }

        



    function changeColor() {
        var body = document.getElementById("pageBody");

        if (body.style.backgroundColor === "rgb(91, 159, 182)") {
            body.style.backgroundColor = "lightgreen";
        } else {
            body.style.backgroundColor = "rgb(91, 159, 182)";
        }
}

        
        


        function validateText() {
            var text = document.getElementById("textInput").value;
            var validation = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]+/;

            if (validation.test(text)) {
                alert("You used a special character !");
            } else {
                alert("Text is valid and works !");
            }
        }

        
        


        function addText() {
            var heading = document.getElementById("mainHeading");
            heading.innerHTML = heading.innerHTML + " Add some Text";
        }



    </script>




</body>
</html>
